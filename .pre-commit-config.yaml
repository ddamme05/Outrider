# .pre-commit-config.yaml
#
# Install dependencies and hooks once per clone:
#     uv sync --dev
#     .venv/bin/pre-commit install --install-hooks
#
# default_install_hook_types below makes the single `install` command wire
# up both pre-commit (per-commit) and pre-push (per-push) hooks at once.
#
# Run manually against all files (useful after a rebase):
#     .venv/bin/pre-commit run --all-files
#     .venv/bin/pre-commit run --all-files --hook-stage pre-push

default_install_hook_types: [pre-commit, pre-push]

repos:
  # --- Local project tooling ---
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: .venv/bin/ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types_or: [python, pyi]

      # Mypy is gated on push, not commit: --strict over the whole src/ tree
      # is slow enough to make per-commit feedback painful, but commits that
      # land type errors should never reach the remote. files: scopes it to
      # src/ so spikes and tests don't trigger it; pass_filenames: false so
      # mypy gets the directory and resolves imports correctly across the
      # tree rather than checking files in isolation.
      - id: mypy
        name: mypy --strict (src/)
        entry: .venv/bin/mypy src
        language: system
        pass_filenames: false
        files: ^src/.*\.py$
        stages: [pre-push]

      - id: invariants-in-sync
        name: invariants.md is in sync with spec.md
        entry: .venv/bin/python scripts/extract_invariants.py --check
        language: system
        pass_filenames: false
        files: ^(docs/(spec|invariants)\.md|scripts/extract_invariants\.py)$

      - id: extractor-tests-pass
        name: extract_invariants.py smoke tests pass
        entry: .venv/bin/python scripts/test_extract_invariants.py
        language: system
        pass_filenames: false
        files: ^scripts/(extract_invariants|test_extract_invariants)\.py$

      # Guards DECISIONS.md cross-reference integrity: every (see #NNN) /
      # Supersedes #NNN / Superseded by #NNN reference must resolve to a
      # real ## NNN. entry, and entry numbers must be unique. Fires only
      # when DECISIONS.md or the checker script changes.
      - id: decision-refs-resolve
        name: DECISIONS.md cross-references resolve
        entry: .venv/bin/python scripts/check_decision_refs.py
        language: system
        pass_filenames: false
        files: ^(DECISIONS\.md|scripts/check_decision_refs\.py)$

      - id: decision-refs-tests-pass
        name: check_decision_refs.py smoke tests pass
        entry: .venv/bin/python scripts/test_check_decision_refs.py
        language: system
        pass_filenames: false
        files: ^scripts/(check_decision_refs|test_check_decision_refs)\.py$

      # Trust-boundary import lint (FUP-005 / DECISIONS.md#038) — the deterministic floor backing the
      # in-session check-trust-boundaries skill. pass_filenames: false, so it scans the whole
      # tree rather than the staged subset. Enforcement scope differs per boundary: the AST
      # firewall scans src/outrider/ + tests/ (tree_sitter has no legit test use); the LLM/GitHub
      # vendor rules + shell-exec scan src/outrider/ only (vendor-SDK use in tests is surface-tier,
      # left to the skill/reviewer). files: fires the hook on any src/tests .py change or an edit
      # to the checker itself.
      - id: boundary-lint
        name: trust-boundary import lint
        entry: .venv/bin/python scripts/check_import_boundaries.py
        language: system
        pass_filenames: false
        files: ^(src/outrider/.*\.py|tests/.*\.py|scripts/check_import_boundaries\.py)$

      - id: boundary-lint-tests-pass
        name: check_import_boundaries.py smoke tests pass
        entry: .venv/bin/python scripts/test_check_import_boundaries.py
        language: system
        pass_filenames: false
        files: ^scripts/(check_import_boundaries|test_check_import_boundaries)\.py$
