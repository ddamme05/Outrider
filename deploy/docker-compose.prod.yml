# Production self-host (DECISIONS.md#069): ONE Outrider application image (FastAPI serving
# the built SPA) + PostgreSQL + a one-shot migration runner. Distinct from the keyless
# docker-compose.demo.yml (three containers, no credentials).
#
#   Existing-ingress mode (default):   docker compose -f deploy/docker-compose.prod.yml up -d --build
#     → app on 127.0.0.1:${OUTRIDER_HTTP_PORT:-8000} (LOOPBACK ONLY, never 0.0.0.0). Front it
#       with YOUR reverse proxy / cloud LB / tunnel terminating HTTPS.
#   Bundled-Caddy mode (auto-HTTPS):   docker compose -f deploy/docker-compose.prod.yml --profile tls up -d --build
#     → Caddy publishes 80/443 and reverse-proxies app:8000 over the internal network.
#
# Either way the app serves plain HTTP and never publishes on a public interface; an HTTPS
# terminator in front is required (Outrider production-security policy, DECISIONS.md#069).
# Config comes from a .env in this directory — see .env.example (root) for the full var list.
name: outrider

x-app-image: &app-image
  image: outrider-app:latest
  build:
    context: ..
    dockerfile: deploy/Dockerfile.prod

# Runtime hardening for the Outrider app/migrate containers (already non-root uid 10001):
# block privilege escalation and drop all Linux capabilities (uvicorn/alembic need none on
# port 8000). Postgres and Caddy get no-new-privileges only, below — postgres initdb needs
# CHOWN/SETUID/SETGID and Caddy needs NET_BIND_SERVICE for 80/443, so `cap_drop: [ALL]`
# would break them.
x-hardening: &hardening
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]

services:
  # External-to-the-image PostgreSQL. For a MANAGED database, delete this service and point
  # DATABASE_URL / the migrate+app env at your managed host instead.
  postgres:
    image: postgres:18-bookworm
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      # -h 127.0.0.1 forces a TCP check (a bare pg_isready reports healthy against the
      # socket-only server during initdb, letting dependents connect before TCP is up).
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    # No published ports — only the app + migrate reach it over the internal network.
    networks: [outrider-net]

  # One-shot schema migration. Runs `alembic upgrade head` to completion, then exits; the app
  # waits on it (service_completed_successfully) so the schema is current before boot. Reuses
  # the app image (alembic + db/ + alembic.ini are baked in); env.py reads DATABASE_URL.
  migrate:
    <<: [*app-image, *hardening]
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [outrider-net]

  app:
    <<: [*app-image, *hardening]
    # env_file carries the GitHub App / Anthropic / admin / HMAC secrets (see .env.example).
    env_file: [.env]
    environment:
      # `environment:` wins over `env_file:`, so this redirects the app at the internal
      # Postgres regardless of any DATABASE_URL in .env. If you set CHECKPOINT_DATABASE_URL
      # in .env for a split checkpoint DB (DECISIONS.md#068), it is NOT overridden here — use
      # the internal service host (`@postgres:5432`) or your managed host, NOT `127.0.0.1`
      # (which resolves to the app container itself). Leaving it unset falls back to the
      # DATABASE_URL below, which is correct for the single-DB default.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      migrate:
        condition: service_completed_successfully
    # LOOPBACK ONLY (127.0.0.1), never 0.0.0.0 — for a host-level reverse proxy in existing-
    # ingress mode. In `--profile tls` mode Caddy reaches the app over the internal network
    # and this mapping is unused. DECISIONS.md#069: no mode publishes the plaintext port publicly.
    ports:
      - "127.0.0.1:${OUTRIDER_HTTP_PORT:-8000}:8000"
    restart: unless-stopped
    networks: [outrider-net]

  # Optional auto-HTTPS front (DECISIONS.md#069). Enabled with `--profile tls`. Publishes
  # 80/443 and reverse-proxies to the app over the internal network (the app keeps no public
  # port of its own). Set OUTRIDER_DOMAIN to your domain for automatic Let's Encrypt certs.
  caddy:
    image: caddy:2
    profiles: [tls]
    security_opt: ["no-new-privileges:true"]
    environment:
      OUTRIDER_DOMAIN: ${OUTRIDER_DOMAIN:?set OUTRIDER_DOMAIN (your domain) to use the tls profile}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped
    networks: [outrider-net]

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  outrider-net:
