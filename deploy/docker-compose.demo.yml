# Keyless public demo: Postgres (seed restored) + the DEMO_MODE app + Caddy
# (serves the SPA, proxies /api, terminates HTTPS). NO Anthropic / GitHub / Slack
# credentials live on this box. Launch: `docker compose -f docker-compose.demo.yml up -d --build`
name: outrider-demo

services:
  postgres:
    image: postgres:18-bookworm
    environment:
      POSTGRES_USER: outrider
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: outrider_demo
    volumes:
      - demo-data:/var/lib/postgresql
      # Auto-restored ONCE, on a fresh data volume. Re-seed: drop the demo-data volume then
      # re-run up.sh (see README "Re-seeding"; `down -v` would also wipe the Caddy cert).
      - ./demo_seed.sql:/docker-entrypoint-initdb.d/01_demo_seed.sql:ro
    healthcheck:
      # -h 127.0.0.1 forces a TCP check. During initdb/seed restore Postgres runs a
      # temporary SOCKET-ONLY server, so a bare pg_isready would report healthy mid-restore
      # and let the app (depends_on: service_healthy) connect before the real TCP server is up.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U outrider -d outrider_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      OUTRIDER_DEMO_MODE: "1"
      OUTRIDER_ADMIN_API_KEY: ${OUTRIDER_ADMIN_API_KEY:?set OUTRIDER_ADMIN_API_KEY in .env}
      DATABASE_URL: postgresql+psycopg://outrider:${POSTGRES_PASSWORD}@postgres:5432/outrider_demo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # No published ports — only Caddy reaches the app over the internal network.

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    environment:
      DEMO_DOMAIN: ${DEMO_DOMAIN:?set DEMO_DOMAIN (your domain, or \":80\" for HTTP on the IP)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  demo-data:
  caddy-data:
  caddy-config:
