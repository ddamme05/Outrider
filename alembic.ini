# Outrider Alembic config (DB connection + logging only).
# Source-code config (script_location, file_template, etc.) lives in
# pyproject.toml under [tool.alembic] per the pyproject_async template.

[alembic]

# Database URL is set at runtime by db/migrations/env.py from $DATABASE_URL.
# Per DECISIONS.md#001, both DATABASE_URL and CHECKPOINT_DATABASE_URL use the
# postgresql+psycopg:// scheme (single driver, both async and sync paths). The
# placeholder below is required by alembic config parsing but is overwritten
# in env.py before any engine is built.
sqlalchemy.url = postgresql+psycopg://placeholder-overridden-in-env-py


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
