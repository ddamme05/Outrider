# CI workflow per `DECISIONS.md#008` Amended 2026-04-30.
#
# Runs the tracked-file-safe subset of pre-commit hooks + pytest as a
# secondary gate. Pre-commit (local) is the primary drift gate; CI catches
# drift at PR time when contributors skip `pre-commit install`.
#
# Excluded from CI: `invariants-in-sync` — the hook runs
# `extract_invariants.py --check`, which defaults to `docs/spec.md` /
# `docs/invariants.md` (both gitignored per `.gitignore` `docs/`). Those
# paths don't exist in a CI checkout, so the hook would fail. Local-side
# discipline gates that hook; future hooks that depend on gitignored paths
# join the same excluded list.
#
# Jobs (CI gates):
#   1. lint          — ruff check + ruff format --check
#   1b. boundary-lint — scripts/check_import_boundaries.py: the deterministic
#                       trust-boundary floor (FUP-005 / DECISIONS.md#038). Fails on a vendor-SDK
#                       import in the wrong wrapper folder, or shell-exec in
#                       src/outrider/. Allowlists mirror the
#                       check-trust-boundaries skill.
#   2. types         — mypy --strict src
#   3. unit          — pytest tests/unit
#   4. integration   — pytest tests/integration against postgres-test brought
#                       up via `docker compose up -d --wait postgres-test`
#                       (NOT GitHub Actions native services: — that doesn't
#                       support tmpfs / arbitrary Postgres args)
#   5. eval — pytest tests/eval --is-eval against postgres-test (the
#                       eval-harness integration-tier test uses the eval_db
#                       fixture). Runs harness-internal tests today; the
#                       17 scaffolded scenarios are skip-marked on day one
#                       and become real gates as their dependencies land.
#   6. dashboard     — npm ci + build (tsc --noEmit && vite build) + vitest run
#                       for the React SPA under dashboard/ (Node toolchain, not uv).
#   7. pre-commit-tracked-only — runs the subset of pre-commit hooks that
#                       depend ONLY on tracked files: ruff, ruff-format,
#                       decision-refs-resolve, decision-refs-tests-pass,
#                       extractor-tests-pass, boundary-lint-tests-pass.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only at the workflow level. Jobs that legitimately need
# write scopes (e.g., commenting on a PR) opt in with their own permissions
# block. Mitigates the impact of a compromised pinned-action SHA.
permissions:
  contents: read

# Cancel in-progress runs for the same ref when a new commit is pushed —
# saves runner minutes on rapid pushes (uses GH Actions concurrency primitive).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # python-version unset: leaving this empty avoids forcing UV_PYTHON
          # (which setup-uv would set if python-version were specified) and
          # lets uv use its normal project/Python discovery. The exact
          # resolution path is uv's concern, not the action's.
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      - name: ruff check
        run: ruff check
      - name: ruff format --check
        run: ruff format --check

  boundary-lint:
    name: boundary-lint (trust-boundary imports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      # FUP-005: the deterministic floor for the AST-firewall / LLM-provider /
      # GitHub-SDK / shell-exec boundaries (`docs/trust-boundaries.md`). The
      # in-session `check-trust-boundaries` skill catches Claude-authored edits;
      # this job catches commits made OUTSIDE a Claude session. Allowlists mirror
      # the skill (stdlib-only checker, so no extra deps beyond the synced env).
      - name: trust-boundary import lint
        run: python scripts/check_import_boundaries.py

  types:
    name: types (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      - name: Cache .mypy_cache
        # Cold mypy --strict on 70 src files is ~2m30s; warm incremental
        # runs are typically <30s. Key invalidates on Python interpreter
        # change (`.python-version`) or dep set change (`pyproject.toml` /
        # `uv.lock` — covers the pinned mypy version itself). `github.sha`
        # suffix lets every run save a fresh cache; `restore-keys` pulls
        # the closest prior cache when the suffix misses.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-py-${{ hashFiles('.python-version') }}-deps-${{ hashFiles('pyproject.toml', 'uv.lock') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-py-${{ hashFiles('.python-version') }}-deps-${{ hashFiles('pyproject.toml', 'uv.lock') }}-
      - name: mypy --strict src
        # `--strict` is redundant with pyproject.toml's `[tool.mypy] strict = true`
        # but explicit at the call site so the YAML is self-describing AND matches
        # the eval-harness spec's Implementation Sketch ("Job 2 `types`: `mypy
        # --strict src`"). Defense: survives any future refactor of the
        # pyproject.toml mypy block. (Section ref, not line number — line
        # numbers in the spec shift as Actual Outcome items get added.)
        run: mypy --strict src

  unit:
    name: unit (pytest tests/unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      - name: pytest tests/unit
        run: pytest tests/unit

  integration:
    name: integration (postgres-test container)
    runs-on: ubuntu-latest
    # Job-level env block per the eval-harness spec: all steps in this
    # job (compose up, readiness wait, pytest) need the same values.
    # These are ephemeral container creds for a tmpfs DB destroyed at job
    # end — not secrets. Mirror .env.example's TEST_* block.
    #
    # `docker-compose.yml` defines the dev `postgres` service with
    # `${POSTGRES_*:?}` required-env-var checks. Compose loads the WHOLE
    # compose file before bringing up any single service, so even
    # `docker compose up postgres-test` fails at file-parse time if those
    # required vars are unset. Setting POSTGRES_* alongside TEST_POSTGRES_*
    # satisfies the parser; the dev service itself is never started in CI.
    env:
      POSTGRES_USER: outrider
      POSTGRES_PASSWORD: ci-ephemeral-dev-password-not-a-secret
      POSTGRES_DB: outrider
      POSTGRES_PORT: 5432
      TEST_POSTGRES_USER: outrider
      TEST_POSTGRES_PASSWORD: ci-ephemeral-test-password-not-a-secret
      TEST_POSTGRES_DB: outrider_test
      TEST_POSTGRES_PORT: 5433
      TEST_DATABASE_URL: postgresql+psycopg://outrider:ci-ephemeral-test-password-not-a-secret@127.0.0.1:5433/outrider_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      - name: Bring up postgres-test (tmpfs, fsync=off, port 5433)
        # `docker compose up -d --wait` blocks until the service's
        # compose-defined healthcheck reports healthy, eliminating the
        # readiness race a bare `up -d` would have. Uses the same
        # docker-compose.yml config the dev container uses — fsync=off,
        # tmpfs, port mapping all preserved by definition.
        run: docker compose up -d --wait postgres-test
      - name: pytest tests/integration
        run: pytest tests/integration

  eval:
    name: eval (harness-internal + scaffolded scenarios)
    runs-on: ubuntu-latest
    # Same env block as the integration job — this job runs the eval-harness
    # integration-tier test (test_is_eval_flag.py) which uses eval_db
    # against postgres-test. Compose validates the whole compose file at
    # parse time, so POSTGRES_* dev-service vars are required even though
    # only postgres-test is brought up.
    env:
      POSTGRES_USER: outrider
      POSTGRES_PASSWORD: ci-ephemeral-dev-password-not-a-secret
      POSTGRES_DB: outrider
      POSTGRES_PORT: 5432
      TEST_POSTGRES_USER: outrider
      TEST_POSTGRES_PASSWORD: ci-ephemeral-test-password-not-a-secret
      TEST_POSTGRES_DB: outrider_test
      TEST_POSTGRES_PORT: 5433
      TEST_DATABASE_URL: postgresql+psycopg://outrider:ci-ephemeral-test-password-not-a-secret@127.0.0.1:5433/outrider_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      - name: Bring up postgres-test (tmpfs, fsync=off, port 5433)
        run: docker compose up -d --wait postgres-test
      - name: pytest tests/eval --is-eval
        # Runs harness-internal tests (test_factory_schema_compliance,
        # test_metrics_framework, test_is_eval_flag) AND the 17
        # scenarios. As each scenario's dependency lands (ast_facts,
        # analyze node, trace node, hitl + audit/replay), its skip
        # marker flips and assertions begin gating. Pytest treats skip
        # as non-failure, so unflipped scenarios still report "pass."
        # As of the ast_facts/ V1 spec landing: 5 structural scenarios
        # are live (async_definitions, decorator_extraction,
        # import_parsing, multiline_signatures, nested_class_method);
        # the remaining 12 are skip-marked pending coordinates/, the
        # analyze node, the trace node, or HITL + audit/replay.
        run: pytest tests/eval --is-eval

  dashboard:
    name: dashboard (typecheck + build + vitest)
    runs-on: ubuntu-latest
    # Frontend SPA under dashboard/ — isolated toolchain (npm, not uv). Runs
    # `npm run build` (tsc --noEmit && vite build) + `vitest run`. Vite 8 needs
    # Node ^20.19 || >=22.12; Node 26 (current) satisfies it. npm ci installs
    # from the committed package-lock.json (lockfile-exact, no resolution drift).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Node 26
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: npm ci
        working-directory: dashboard
        run: npm ci
      - name: build (tsc --noEmit && vite build)
        working-directory: dashboard
        run: npm run build
      - name: vitest run
        working-directory: dashboard
        run: npm test

  pre-commit-tracked-only:
    name: pre-commit-tracked-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv + Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          activate-environment: true
      - name: uv sync --frozen
        run: uv sync --dev --frozen
      # Run only the hooks that depend on tracked files. invariants-in-sync
      # is excluded because extract_invariants.py --check defaults to
      # docs/spec.md / docs/invariants.md (gitignored). Per DECISIONS#008
      # Amended 2026-04-30, this is the canonical CI scope.
      - name: ruff (pre-commit hook)
        run: pre-commit run ruff --all-files
      - name: ruff-format (pre-commit hook)
        run: pre-commit run ruff-format --all-files
      - name: decision-refs-resolve (pre-commit hook)
        run: pre-commit run decision-refs-resolve --all-files
      - name: decision-refs-tests-pass (pre-commit hook)
        run: pre-commit run decision-refs-tests-pass --all-files
      - name: extractor-tests-pass (pre-commit hook)
        run: pre-commit run extractor-tests-pass --all-files
      - name: boundary-lint-tests-pass (pre-commit hook)
        run: pre-commit run boundary-lint-tests-pass --all-files
